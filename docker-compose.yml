version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zanis-postgres
    environment:
      POSTGRES_USER: zanis
      POSTGRES_PASSWORD: zanis_postgres_password
      POSTGRES_DB: zanis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zanis"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zanis-backend
    environment:
      DATABASE_URL: postgresql://zanis:zanis_postgres_password@postgres:5432/zanis_db
    ports:
      - "8000:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 80 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zanis-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  default:
    name: zanis-network
