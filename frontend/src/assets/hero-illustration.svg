<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background shapes -->
  <circle cx="200" cy="150" r="100" fill="url(#grad2)" opacity="0.6"/>
  <circle cx="1000" cy="450" r="150" fill="url(#grad2)" opacity="0.6"/>
  
  <!-- Main illustration: Dashboard/Infrastructure -->
  <g transform="translate(600, 300)">
    <!-- Central cube -->
    <path d="M -80 -80 L 0 -120 L 80 -80 L 80 80 L 0 120 L -80 80 Z" fill="url(#grad1)" opacity="0.9"/>
    
    <!-- Connected nodes -->
    <circle cx="-180" cy="-100" r="25" fill="url(#grad1)"/>
    <circle cx="180" cy="-100" r="25" fill="url(#grad1)"/>
    <circle cx="-180" cy="100" r="25" fill="url(#grad1)"/>
    <circle cx="180" cy="100" r="25" fill="url(#grad1)"/>
    
    <!-- Connection lines -->
    <line x1="-80" y1="-80" x2="-180" y2="-100" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="-80" x2="180" y2="-100" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="-80" y1="80" x2="-180" y2="100" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="80" x2="180" y2="100" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    
    <!-- Orbiting particles -->
    <circle cx="0" cy="-150" r="8" fill="#00d4ff" opacity="0.8">
      <animateMotion dur="20s" repeatCount="indefinite">
        <mpath href="#orbit" />
      </animateMotion>
    </circle>
    
    <!-- Data flow indicators -->
    <rect x="-120" y="-30" width="240" height="60" rx="8" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>
    <text x="0" y="10" font-size="14" font-weight="bold" fill="#00d4ff" text-anchor="middle" opacity="0.7">INFRASTRUCTURE</text>
  </g>
  
  <!-- Stats boxes -->
  <g>
    <!-- Box 1 -->
    <rect x="80" y="480" width="220" height="80" rx="8" fill="rgba(0, 212, 255, 0.05)" stroke="url(#grad1)" stroke-width="1.5"/>
    <text x="100" y="510" font-size="24" font-weight="bold" fill="#00d4ff">99.9%</text>
    <text x="100" y="535" font-size="14" fill="#9ca3af">Uptime SLA</text>
    
    <!-- Box 2 -->
    <rect x="340" y="480" width="220" height="80" rx="8" fill="rgba(157, 51, 234, 0.05)" stroke="url(#grad1)" stroke-width="1.5"/>
    <text x="360" y="510" font-size="24" font-weight="bold" fill="#9333ea">24/7</text>
    <text x="360" y="535" font-size="14" fill="#9ca3af">Support</text>
    
    <!-- Box 3 -->
    <rect x="600" y="480" width="220" height="80" rx="8" fill="rgba(0, 212, 255, 0.05)" stroke="url(#grad1)" stroke-width="1.5"/>
    <text x="620" y="510" font-size="24" font-weight="bold" fill="#00d4ff">&lt;10ms</text>
    <text x="620" y="535" font-size="14" fill="#9ca3af">Response Time</text>
    
    <!-- Box 4 -->
    <rect x="860" y="480" width="220" height="80" rx="8" fill="rgba(157, 51, 234, 0.05)" stroke="url(#grad1)" stroke-width="1.5"/>
    <text x="880" y="510" font-size="24" font-weight="bold" fill="#9333ea">10K+</text>
    <text x="880" y="535" font-size="14" fill="#9ca3af">Deployments</text>
  </g>
</svg>
