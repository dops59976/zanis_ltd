apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zanis-ingress
  namespace: default
  labels:
    app: frontend
spec:
  ingressClassName: nginx
  rules:
  - host: zanis.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: www.zanis.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
