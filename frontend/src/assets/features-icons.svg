<svg viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Security Icon -->
  <g id="security">
    <rect x="10" y="20" width="50" height="60" rx="4" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <path d="M 20 35 L 35 50 L 50 35" fill="none" stroke="url(#icon-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Speed Icon -->
  <g id="speed">
    <circle cx="105" cy="50" r="25" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <path d="M 105 30 L 105 70 M 85 50 L 125 50" stroke="url(#icon-grad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="105" cy="50" r="5" fill="url(#icon-grad)"/>
  </g>
  
  <!-- Analytics Icon -->
  <g id="analytics">
    <rect x="160" y="35" width="8" height="40" fill="url(#icon-grad)"/>
    <rect x="175" y="25" width="8" height="50" fill="url(#icon-grad)"/>
    <rect x="190" y="30" width="8" height="45" fill="url(#icon-grad)"/>
    <line x1="155" y1="75" x2="200" y2="75" stroke="url(#icon-grad)" stroke-width="2"/>
  </g>
  
  <!-- Integration Icon -->
  <g id="integration">
    <circle cx="255" cy="40" r="12" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <circle cx="280" cy="50" r="12" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <circle cx="255" cy="60" r="12" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <line x1="267" y1="40" x2="268" y2="40" stroke="url(#icon-grad)" stroke-width="2"/>
    <line x1="267" y1="60" x2="268" y2="60" stroke="url(#icon-grad)" stroke-width="2"/>
  </g>
  
  <!-- Team Icon -->
  <g id="team">
    <circle cx="345" cy="35" r="8" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <circle cx="325" cy="55" r="8" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <circle cx="365" cy="55" r="8" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <path d="M 345 43 L 325 47 M 345 43 L 365 47" stroke="url(#icon-grad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Auto-scaling Icon -->
  <g id="autoscale">
    <rect x="425" y="25" width="15" height="15" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <rect x="450" y="20" width="20" height="20" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <rect x="480" y="15" width="25" height="25" fill="none" stroke="url(#icon-grad)" stroke-width="2"/>
    <path d="M 440 32 L 450 20 M 470 40 L 480 15" stroke="url(#icon-grad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
