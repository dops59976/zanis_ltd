---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zanis-ingress
  namespace: apps
  labels:
    app: ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
  # Frontend route
  - host: zanis.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  
  # API route
  - host: api.zanis.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
  
  # TLS configuration (optional - requires cert-manager)
  # tls:
  # - hosts:
  #   - zanis.com
  #   - api.zanis.com
  #   secretName: zanis-tls
